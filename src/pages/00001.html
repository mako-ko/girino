<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tad - sistema gerenciador de tarefas</title>
    <link href="https://mako-ko.github.io/tad/src/img/tad-icon.svg" rel="icon" />

    <!-- Google Fonts, Playfair Display para títulos e Inter para corpo do texto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@100..900&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="https://mako-ko.github.io/tad/src/dashboard.css">
</head>

<body>
    <!-- Barra de Navegação -->
    <a class="skip-line" href="#conteudo-principal">Pular para o conteúdo principal.</a>
    <header class="header">
        <!-- Logo -->
        <a class="logo" href="https://mako-ko.github.io/tad/src/index.html">
            <div class="logo-icon">
                <img loading="lazy" src="https://mako-ko.github.io/tad/src/img/icon.svg"
                    alt="tad, sistema gerenciador de tarefas">
            </div>
        </a>
        <!-- Menu de Navegação -->
        <nav class="nav">
            <ul>
                <li><a href="https://mako-ko.github.io/tad/src/pages/dashboard.html">Minhas tarefas</a></li>
                <li><a href="https://mako-ko.github.io/tad/src/pages/newtask.html">Criar tarefa</a></li>
                <li><a href="https://mako-ko.github.io/tad/src/pages/config.html">Configurações</a></li>
                <li><a href="https://mako-ko.github.io/tad/src/pages/index.html">Sair</a></li>
            </ul>
        </nav>
    </header>

    <!-- Conteúdo Principal -->
    <main class="main" id="conteudo-principal" tabindex="-1">
        <div class="taskboard">

            <!-- página estática da tarefa prioridade 1 -->
            <div class="task-card-frog">
                <div class="task-title">
                    <h2>Tarefa Prioridade 1</h2>
                    <button class="btn-cancel" type="button"><a
                            href="https://mako-ko.github.io/tad/src/pages/dashboard.html">Voltar</a></button>
                </div>
                <form class="form-task">
                    <div class="form-1">
                        <p>
                            <label for="date">Data:</label>
                            <input type="datetime" id="date" name="date" placeholder="06/04/2026" required>
                        </p>
                        <p>
                            <label for="priority">Prioridade:</label>
                            <select id="priority" name="priority">
                                <option value="frog" selected>Sapo</option>
                                <option value="no-frog">Outra</option>
                            </select>
                        </p>
                    </div>
                    <p>
                        <label for="details">Descrição:</label>
                        <textarea name="details" rows="10" cols="30">Aqui deve aparecer uma descrição completa do que seria a tarefa prioridade 1. Seguindo o método Eat The Frog, essa seria a maior e mais importante tarefa a ser concluída no seu dia. Assim, deve se usar bons critérios para que ela seja escolhida como tal.</textarea>
                    </p>
                </form>
                <div class="btn-group">
                    <button class="btn-edit" type="button"><a
                            href="https://mako-ko.github.io/tad/src/pages/00001-edit.html">Editar</a></button>
                    <button class="btn-check" type="button">Concluir</button>
                </div>
            </div>
        </div>
    </main>

    <footer id="footer" class="footer">2026. tad - sistema gerenciador de tarefas. <br>
        Marianne L Ferreira. Projeto para o Centro de Educação Profissional - Escola Ténica de Guará.
    </footer>
</body>

</html>
